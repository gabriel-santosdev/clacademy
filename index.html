<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── SEO Principal ── -->
  <title>CL Academy – Aulas em Grupo, Personal Trainer & Eventos Fitness</title>
  <meta name="description"
    content="CL Academy: aulas coletivas, personal trainer, eventos e experiências fitness que transformam movimento em estilo de vida. Venha treinar com a gente!" />
  <meta name="keywords"
    content="academia, fitness, aulas em grupo, personal trainer, eventos fitness, dança, treino funcional, CL Academy, aulas coletivas, emagrecimento, condicionamento físico" />
  <meta name="author" content="CL Academy" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://clacademy.com.br/" />

  <!-- ── Open Graph (WhatsApp, Facebook, LinkedIn) ── -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="CL Academy" />
  <meta property="og:title" content="CL Academy – Aulas em Grupo, Personal Trainer & Eventos Fitness" />
  <meta property="og:description"
    content="Aulas coletivas, personal trainer, eventos e experiências fitness que transformam movimento em estilo de vida." />
  <meta property="og:url" content="https://clacademy.com.br/" />
  <meta property="og:image" content="https://clacademy.com.br/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="pt_BR" />

  <!-- ── Twitter Card ── -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="CL Academy – Aulas em Grupo, Personal Trainer & Eventos Fitness" />
  <meta name="twitter:description"
    content="Aulas coletivas, personal trainer, eventos e experiências fitness que transformam movimento em estilo de vida." />
  <meta name="twitter:image" content="https://clacademy.com.br/og-image.jpg" />

  <!-- ── Schema.org — Negócio Local ── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SportsActivityLocation",
    "name": "CL Academy",
    "description": "Academia com aulas coletivas, personal trainer, eventos fitness e experiências que transformam movimento em estilo de vida.",
    "url": "https://clacademy.com.br",
    "logo": "https://clacademy.com.br/cl_academy_logo.png",
    "image": "https://clacademy.com.br/og-image.jpg",
    "priceRange": "$$",
    "currenciesAccepted": "BRL",
    "paymentAccepted": "Cash, Credit Card, Pix",
    "hasOfferCatalog": {
      "@type": "OfferCatalog",
      "name": "Serviços CL Academy",
      "itemListElement": [
        { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Aulas Coletivas" } },
        { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Personal Trainer" } },
        { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Eventos Fitness" } },
        { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Aulas de Dança" } },
        { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Treino Funcional" } }
      ]
    },
    "sameAs": [
      "https://www.instagram.com/clacademy"
    ]
  }
  </script>

  <!-- ── Favicon ── -->
  <link rel="icon" type="image/png" href="/cl_academy_logo.png" />

  <!-- ── Fontes ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
